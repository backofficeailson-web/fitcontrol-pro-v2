<header class="topbar">
  <div class="flex items-center gap-3">
    <button class="sidebar-toggle btn-icon" type="button" data-sidebar-toggle aria-label="Abrir menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <div class="breadcrumb">
      <span>FitControl</span>
      <span class="sep">/</span>
      <span class="current">{% block breadcrumb %}Painel{% endblock %}</span>
    </div>
  </div>
  <div class="topbar-actions">
    <button class="btn btn-ghost btn-sm" type="button" data-modal-open="#modal-protocolo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6M9 16h6M5 4h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V6a2 2 0 012-2z"/></svg>
      Selecionar protocolo
    </button>
    {% if current_user.is_authenticated %}
    <div class="user-chip">
      <div class="avatar">{{ current_user.nome[:1]|upper }}</div>
      <div>
        <div class="name">{{ current_user.nome.split()[0] }}</div>
        <div class="role">{{ current_user.cref or 'Coach' }}</div>
      </div>
    </div>
    {% endif %}
  </div>
</header>
