# ===========================================================================
# FitControl Pro 2.0 — Render Blueprint (https://render.com)
# Push to GitHub, then "New + → Blueprint" pointing at this repo.
# ===========================================================================
services:
  - type: web
    name: fitcontrol-pro
    runtime: python
    plan: starter
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: "pip install -r requirements.txt && flask db upgrade || true"
    startCommand: "gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 3 --threads 2 --timeout 60"
    healthCheckPath: /healthz
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.12.5
      - key: SECRET_KEY
        generateValue: true
      - key: WTF_CSRF_SECRET_KEY
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: BEHIND_PROXY
        value: "True"
      - key: LOG_TO_STDOUT
        value: "True"
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        fromDatabase:
          name: fitcontrol-postgres
          property: connectionString

databases:
  - name: fitcontrol-postgres
    plan: free
    databaseName: fitcontrol
    user: fitcontrol
