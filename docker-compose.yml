# ===========================================================================
# FitControl Pro 2.0 — Local production-like stack
# Usage:
#   docker compose up --build
# Access: http://localhost:5000
# ===========================================================================

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fitcontrol
      POSTGRES_PASSWORD: fitcontrol_secret
      POSTGRES_DB: fitcontrol
    volumes:
      - fitcontrol_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitcontrol -d fitcontrol"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      SECRET_KEY: "please-change-me-to-a-long-random-string-prod-only"
      WTF_CSRF_SECRET_KEY: "please-change-me-to-another-long-random-string"
      DATABASE_URL: "postgresql+psycopg://fitcontrol:fitcontrol_secret@db:5432/fitcontrol"
      RATELIMIT_STORAGE_URI: "redis://redis:6379/0"
      SESSION_COOKIE_SECURE: "False"   # set True behind HTTPS reverse proxy
      BEHIND_PROXY: "True"
      LOG_TO_STDOUT: "True"
      PORT: "5000"
    ports:
      - "5000:5000"
    volumes:
      - fitcontrol_uploads:/app/static/uploads
      - fitcontrol_logs:/app/logs

volumes:
  fitcontrol_pgdata:
  fitcontrol_uploads:
  fitcontrol_logs:
