# ===========================================================================
# FitControl Pro 2.0 — Fly.io configuration
# Deploy: fly launch (use existing Dockerfile) then `fly deploy`
# Provision Postgres: fly postgres create && fly postgres attach <name>
# ===========================================================================
app = "fitcontrol-pro"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  FLASK_ENV = "production"
  PORT = "5000"
  SESSION_COOKIE_SECURE = "True"
  BEHIND_PROXY = "True"
  LOG_TO_STDOUT = "True"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 25
    hard_limit = 50

[[http_service.checks]]
  grace_period = "20s"
  interval = "15s"
  method = "GET"
  timeout = "5s"
  path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
