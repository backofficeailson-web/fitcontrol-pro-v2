app = "fitcontrol-pro-v2"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  FLASK_APP = "wsgi.py"
  FLASK_ENV = "production"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
